<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח יציאות — Jerusalem Stone Split-Flap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- All design fonts loaded so theme switching is instant. -->
  <link href="https://fonts.googleapis.com/css2?family=Bellefair&family=David+Libre:wght@400;500;700&family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- All design themes loaded with media="not all" so the browser
       fetches each on first paint without applying it. The inline
       script below activates one (from localStorage, default
       attempt3) by switching its media to "all". The dropdown in
       .controls toggles them at runtime. -->
  <link rel="stylesheet" href="theme-baseline.css?v=__COMMIT_SHA__" media="not all" id="theme-baseline">
  <link rel="stylesheet" href="theme-attempt1.css?v=__COMMIT_SHA__" media="not all" id="theme-attempt1">
  <link rel="stylesheet" href="theme-attempt2.css?v=__COMMIT_SHA__" media="not all" id="theme-attempt2">
  <link rel="stylesheet" href="theme-attempt3.css?v=__COMMIT_SHA__" media="not all" id="theme-attempt3">
  <link rel="stylesheet" href="theme-attempt4.css?v=__COMMIT_SHA__" media="not all" id="theme-attempt4">
  <link rel="stylesheet" href="theme-attempt5.css?v=__COMMIT_SHA__" media="not all" id="theme-attempt5">
  <link rel="stylesheet" href="theme-attempt6.css?v=__COMMIT_SHA__" media="not all" id="theme-attempt6">
  <link rel="stylesheet" href="theme-attempt7.css?v=__COMMIT_SHA__" media="not all" id="theme-attempt7">
  <script>
    (function () {
      var saved = localStorage.getItem('design-theme') || 'attempt7';
      var link = document.getElementById('theme-' + saved);
      if (link) link.media = 'all';
    })();
  </script>
  <meta name="build-sha" content="__COMMIT_SHA__">
</head>
<body>
  <main>
    <section class="display-frame" aria-label="לוח יציאות מתפצל">
      <div id="board" class="board" dir="rtl"></div>
    </section>

    <section class="controls">
      <div class="control-row">
        <label for="theme-select">עיצוב</label>
        <select id="theme-select" dir="rtl">
          <option value="baseline">בסיס — אבן ירושלמית</option>
          <option value="attempt1">ניסיון 1 — עץ + זכוכית</option>
          <option value="attempt2">ניסיון 2 — זכוכית · Bellefair</option>
          <option value="attempt3">ניסיון 3 — זכוכית קרירה · David Libre</option>
          <option value="attempt4">ניסיון 4 — זכוכית שקופה · David Libre</option>
          <option value="attempt5">ניסיון 5 — זכוכית מטושטשת · David Libre</option>
          <option value="attempt6">ניסיון 6 — זכוכית רציפה · David Libre</option>
          <option value="attempt7">ניסיון 7 — זכוכית חלקה (מעבר רציף) · David Libre</option>
        </select>
      </div>
      <div class="control-row">
        <label>תאריך לועזי</label>
        <select id="greg-day" dir="ltr"></select>
        <select id="greg-month" dir="rtl"></select>
        <select id="greg-year" dir="ltr"></select>
        <div class="hcal-wrap">
          <button type="button" id="gcal-toggle" aria-label="פתח לוח חודשי">📅</button>
          <div id="gcal-popup" class="hcal-popup" hidden></div>
        </div>
      </div>
      <div class="control-row">
        <label>תאריך עברי</label>
        <select id="heb-day" dir="ltr"></select>
        <select id="heb-month" dir="rtl"></select>
        <select id="heb-year" dir="ltr"></select>
        <div class="hcal-wrap">
          <button type="button" id="hcal-toggle" aria-label="פתח לוח חודשי">📅</button>
          <div id="hcal-popup" class="hcal-popup" hidden></div>
        </div>
      </div>
      <div class="control-row">
        <label for="time-pick">שעה</label>
        <input type="time" id="time-pick" dir="ltr" step="1">
        <button type="button" id="time-now">חזרה לעכשיו</button>
      </div>
      <div class="control-row">
        <label>ניווט</label>
        <button type="button" id="date-prev" aria-label="יום קודם">▶ יום קודם</button>
        <button type="button" id="date-next" aria-label="יום הבא">יום הבא ◀</button>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <small>אבן ירושלמית · <span id="build-sha" dir="ltr">dev</span></small>
  </footer>

  <!-- Temporal polyfill — must load before hebcal-core, since the
       bundle's Zmanim class uses Temporal.PlainDate at construction. -->
  <script src="vendor/temporal-polyfill.min.js?v=__COMMIT_SHA__"></script>
  <script src="vendor/hebcal-core.min.js"></script>
  <script src="core.js?v=__COMMIT_SHA__"></script>
  <script src="liturgy.js?v=__COMMIT_SHA__"></script>
  <script src="app.js?v=__COMMIT_SHA__"></script>
  <script>
    // Theme switcher: dropdown selects one of the three theme
    // stylesheets loaded in <head>. Persisted to localStorage so the
    // page reopens with the same selection. The head-level script
    // already activated the saved theme; this only wires up live
    // switching.
    (function () {
      var THEMES = ['baseline', 'attempt1', 'attempt2', 'attempt3', 'attempt4', 'attempt5', 'attempt6', 'attempt7'];
      var sel = document.getElementById('theme-select');
      if (!sel) return;
      sel.value = localStorage.getItem('design-theme') || 'attempt7';
      sel.addEventListener('change', function () {
        var name = sel.value;
        THEMES.forEach(function (t) {
          var link = document.getElementById('theme-' + t);
          if (link) link.media = (t === name) ? 'all' : 'not all';
        });
        localStorage.setItem('design-theme', name);
      });
    })();
  </script>
</body>
</html>
