<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח יציאות — Jerusalem Stone Split-Flap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=__COMMIT_SHA__">
  <meta name="build-sha" content="__COMMIT_SHA__">
</head>
<body>
  <header class="page-header">
    <h1>לוח יציאות</h1>
    <p class="subtitle">Jerusalem Stone Split-Flap Display</p>
  </header>

  <main>
    <section class="display-frame" aria-label="לוח יציאות מתפצל">
      <div class="board-info-bar" dir="rtl">
        <span id="header-date" class="header-date-text"></span>
        <span id="header-time" class="header-time-text"></span>
      </div>
      <div id="board" class="board" dir="rtl"></div>
    </section>

    <section class="controls" dir="rtl">
      <label for="message">הודעה</label>
      <textarea
        id="message"
        rows="7"
        dir="rtl"
        lang="he"
        spellcheck="false"
        placeholder="הקלידו טקסט כאן…">שלום ירושלים
ברוכים הבאים
רכבת לתל אביב
שעה שמונה בערב
רציף שלוש
רכבת לחיפה
נסיעה בטוחה</textarea>

      <div class="control-row">
        <button id="set-btn" type="button">הצג על הלוח</button>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <small>אבן ירושלמית · Frank Ruhl Libre · <span id="build-sha" dir="ltr">dev</span></small>
  </footer>

  <script src="app.js?v=__COMMIT_SHA__"></script>
</body>
</html>
