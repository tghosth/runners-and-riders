<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח יציאות — Jerusalem Stone Split-Flap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=__COMMIT_SHA__">
  <meta name="build-sha" content="__COMMIT_SHA__">

<body>
  <main>
    <section class="display-frame" aria-label="לוח יציאות מתפצל">
      <div id="board" class="board" dir="rtl"></div>
    </section>

    <section class="controls">
      <div class="control-row">
        <label for="date-pick">תאריך לועזי</label>
        <input type="date" id="date-pick" dir="ltr">
      </div>
      <div class="control-row">
        <label>תאריך עברי</label>
        <select id="heb-day" dir="ltr"></select>
        <select id="heb-month" dir="rtl"></select>
        <select id="heb-year" dir="ltr"></select>
        <div class="hcal-wrap">
          <button type="button" id="hcal-toggle" aria-label="פתח לוח חודשי">📅</button>
          <div id="hcal-popup" class="hcal-popup" hidden></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <small>אבן ירושלמית · Frank Ruhl Libre · <span id="build-sha" dir="ltr">dev</span></small>
  </footer>

  <script src="vendor/hebcal-core.min.js"></script>
  <script src="liturgy.js?v=__COMMIT_SHA__"></script>
  <script src="app.js?v=__COMMIT_SHA__"></script>
