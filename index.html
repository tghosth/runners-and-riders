<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח יציאות — Jerusalem Stone Split-Flap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=__COMMIT_SHA__">
  <meta name="build-sha" content="__COMMIT_SHA__">
</head>
<body>
  <main>
    <section class="display-frame" aria-label="לוח יציאות מתפצל">
      <div id="board" class="board" dir="rtl"></div>
    </section>

    <section class="controls">
      <div class="control-row">
        <label>תאריך לועזי</label>
        <select id="greg-day" dir="ltr"></select>
        <select id="greg-month" dir="rtl"></select>
        <select id="greg-year" dir="ltr"></select>
        <div class="hcal-wrap">
          <button type="button" id="gcal-toggle" aria-label="פתח לוח חודשי">📅</button>
          <div id="gcal-popup" class="hcal-popup" hidden></div>
        </div>
      </div>
      <div class="control-row">
        <label>תאריך עברי</label>
        <select id="heb-day" dir="ltr"></select>
        <select id="heb-month" dir="rtl"></select>
        <select id="heb-year" dir="ltr"></select>
        <div class="hcal-wrap">
          <button type="button" id="hcal-toggle" aria-label="פתח לוח חודשי">📅</button>
          <div id="hcal-popup" class="hcal-popup" hidden></div>
        </div>
      </div>
      <div class="control-row">
        <label for="time-pick">שעה</label>
        <input type="time" id="time-pick" dir="ltr" step="1">
        <button type="button" id="time-now">חזרה לעכשיו</button>
      </div>
      <div class="control-row">
        <label>ניווט</label>
        <button type="button" id="date-prev" aria-label="יום קודם">▶ יום קודם</button>
        <button type="button" id="date-next" aria-label="יום הבא">יום הבא ◀</button>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <small>אבן ירושלמית · Heebo · <span id="build-sha" dir="ltr">dev</span></small>
  </footer>

  <!-- Temporal polyfill — must load before hebcal-core, since the
       bundle's Zmanim class uses Temporal.PlainDate at construction. -->
  <script src="vendor/temporal-polyfill.min.js?v=__COMMIT_SHA__"></script>
  <script src="vendor/hebcal-core.min.js"></script>
  <script src="core.js?v=__COMMIT_SHA__"></script>
  <script src="liturgy.js?v=__COMMIT_SHA__"></script>
  <script src="app.js?v=__COMMIT_SHA__"></script>
</body>
</html>
